<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store Screenshot Resizer</title>
    <meta name="description" content="Quickly resize your images to App Store screenshot sizes for iPhone and iPad.">
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>App Store Screenshot Resizer</h1>
            <p class="subtitle">Resize your images to the exact App Store dimensions</p>
        </header>

        <div class="device-selector">
            <button class="device-btn active" data-device="phone" data-width="1242" data-height="2688">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
                <span>iPhone 6.5"</span>
                <span class="dimensions">1242 × 2688 px</span>
            </button>
            <button class="device-btn" data-device="ipad" data-width="2064" data-height="2752">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="20" x="3" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
                <span>iPad 13"</span>
                <span class="dimensions">2064 × 2752 px</span>
            </button>
        </div>

        <div class="upload-area" id="uploadArea">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
            <p class="upload-text">Drag & drop your images here</p>
            <p class="upload-hint">or click to browse</p>
            <input type="file" id="fileInput" multiple accept="image/*" hidden>
        </div>

        <div class="images-section" id="imagesSection" style="display: none;">
            <div class="images-header">
                <h2 id="imageCount">0 images ready</h2>
                <div class="header-actions">
                    <button class="btn btn-secondary" id="addMoreBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        Add More
                    </button>
                    <button class="btn btn-primary" id="downloadAllBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        Download All
                    </button>
                    <button class="btn btn-danger" id="clearAllBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        Clear
                    </button>
                </div>
            </div>

            <div class="image-grid" id="imageGrid"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
